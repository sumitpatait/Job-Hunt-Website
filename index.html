const tbody = document.getElementById('tbody');
const countEl = document.getElementById('count');

function getTypeBadge(type) {
  if (type === 'MNC') return '<span class="badge badge-mn">MNC</span>';
  if (type === 'Fintech') return '<span class="badge badge-fi">Fintech</span>';
  return '<span class="badge badge-st">Startup</span>';
}

function render(list) {
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-results">No companies found. Try a different search.</td></tr>';
    countEl.innerHTML = '<span>0</span> companies';
    return;
  }
  tbody.innerHTML = list.map(([name, domain, type], i) => `
    <tr>
      <td class="num">${i+1}</td>
      <td class="company-name">${name}</td>
      <td class="domain">${domain}</td>
      <td>${getTypeBadge(type)}</td>
      <td><a class="website" href="https://${domain}" target="_blank">↗ Website</a></td>
      <td><a href="https://${domain}/careers" target="_blank" class="career-link">Apply →</a></td>
    </tr>
  `).join('');
  countEl.innerHTML = `<span>${list.length}</span> companies`;
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const t = document.getElementById('typeFilter').value;
  const filtered = companies.filter(([name, domain, type]) =>
    (name.toLowerCase().includes(q) || domain.toLowerCase().includes(q)) &&
    (t === '' || type === t)
  );
  render(filtered);
}

render(companies);
</script>
